<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Gestión de Personas</title>
  <link rel="stylesheet" href="./style.css?v=20260624-admin-por-pc" />
</head>

<body>
<div class="app">

    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">📋</div>
        <p id="totalPersonas">0 personas cargadas</p>
      </div>

      <button id="btnPanel" class="nav-btn active">
        <span>🏠</span>
        <span>Panel Principal</span>
      </button>

      <button id="btnAgenda" class="nav-btn">
        <span>📒</span>
        <span>Agenda</span>
      </button>

      <button id="btnCalcular" class="nav-btn">
        <span>🧮</span>
        <span>Calcular</span>
      </button>

      <button id="btnLibro" class="nav-btn">
        <span>📘</span>
        <span>Libro</span>
      </button>

      <button id="btnGraficos" class="nav-btn">
        <span>📊</span>
        <span>Gráficos</span>
      </button>

      <div class="section-title">BASES DE DATOS</div>
      <div id="categoriasSidebar"></div>

      <div class="new-db-box">
        <button id="btnMostrarNuevaCat" class="new-db-btn">＋ Nueva base de datos</button>

        <div id="formNuevaCat" class="new-db-form hidden">
          <div class="tipo-base-box">
            <button type="button" id="tipoBaseNormal" class="tipo-base-btn active">📁 Base normal</button>
            <button type="button" id="tipoBaseBarrio" class="tipo-base-btn">🏘️ Base para barrios</button>
          </div>

          <input id="inputNuevaCat" placeholder="Nombre de la base de datos..." />

          <input id="tipoNuevaCat" type="hidden" value="normal" />

          <div class="mini-actions">
            <button id="btnGuardarNuevaCat">Agregar</button>
            <button id="btnCancelarNuevaCat">Cancelar</button>
          </div>
        </div>
      </div>
    </aside>

    <main class="content">

      <section id="panelView" class="view">
        <div class="container">

          <div class="topbar">
            <div>
              <h1>Panel Principal</h1>
              <p>Cargá una nueva persona y asignala a una base de datos</p>
            </div>

            <button id="btnCrearArchivo" class="primary ghost">🧾 Crear archivo</button>
          <button id="btnCargarPersona" class="primary">+ Cargar Persona</button>
          </div>

          <div id="formPersona" class="form-card hidden">
            <h2 id="formTitle">➕ Nueva Persona</h2>

            <div class="grid-form">
              <label>
                Nombre *
                <input id="nombre" placeholder="Nombre completo" />
              </label>

              <label>
                Celular
                <input id="celular" placeholder="Ej: 2926-123456" />
              </label>

              <label>
                Dirección
                <input id="direccion" placeholder="Calle y número" />
              </label>

              <label>
                Barrio
                <input id="barrio" placeholder="Nombre del barrio" />
              </label>

              <label class="full">
                Motivo de consulta
                <textarea id="motivo" rows="3" placeholder="Describir el motivo de consulta..."></textarea>
              </label>

              <label class="full">
                Base de datos de destino *
                <select id="categoriaSelect"></select>
              </label>

              <label>
                Fecha de carga
                <input id="fechaCarga" type="date" />
              </label>
            </div>

            <div id="destinoAviso" class="destino-aviso hidden"></div>

            <div class="actions">
              <button id="btnGuardarPersona" class="primary">Guardar Persona</button>
              <button id="btnCancelarPersona" class="secondary">Cancelar</button>
            </div>
          </div>

          <div id="cardsCategorias" class="cards-grid"></div>

        </div>
      </section>

      <section id="categoriaView" class="view hidden">
        <div class="container">
          <div id="categoriaHeader" class="cat-header"></div>

          <input
            id="busqueda"
            class="search"
            placeholder="🔍 Buscar por nombre, barrio o celular..."
          />

          <div id="personasLista" class="personas-lista"></div>
        </div>
      </section>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./renderer.js?v=20260625-admin-pcs-nube"></script>
</body>
</html>
